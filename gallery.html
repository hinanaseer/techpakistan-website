<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechPakistan Gallery</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
}

header{
    background:#111827;
    padding:20px;
    text-align:center;
}

h1{
    color:#38bdf8;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
    padding:40px;
}

.gallery img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:10px;
    transition:0.3s;
}

.gallery img:hover{
    transform:scale(1.05);
}

.back-btn{
    display:inline-block;
    margin:20px;
    padding:10px 20px;
    background:#38bdf8;
    color:black;
    text-decoration:none;
    border-radius:20px;
}

</style>
</head>

<body>

<header>
    <h1>TechPakistan Gallery</h1>
</header>

<a href="index.html" class="back-btn">Back To Home</a>

<div class="gallery">

    <img src="images/project1.jpg" alt="">
    <img src="images/project2.jpg" alt="">
    <img src="images/project3.jpg" alt="">
    <img src="images/project4.jpg" alt="">
    <img src="images/project1.jpg" alt="">
    <img src="images/project2.jpg" alt="">

</div>

</body>
</html>
